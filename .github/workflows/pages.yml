# Build the Jekyll site and publish it to GitHub Pages.
#
# The build step matters: it runs Jekyll with _config.yml, whose `exclude:`
# list keeps development-only files out of the artifact. Uploading a raw
# checkout instead (the "static HTML" starter workflow) ships everything in
# the repository and produces the oversized artifacts that make
# actions/deploy-pages hang at "Getting Pages deployment status..." and then
# fail. The deploy step below also gets a 30-minute status timeout so a slow
# Pages backend does not abort an otherwise healthy deployment.
name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# one deployment at a time; do not cancel a production deploy mid-flight
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Sanity-check the built site
        run: |
          set -e
          test -f _site/index.html || { echo "::error::index.html missing from _site"; exit 1; }
          test -f _site/assets/data/corpus.sqlite.gz || { echo "::error::corpus.sqlite.gz missing from _site (check _config.yml excludes)"; exit 1; }
          if find _site -type l | grep -q .; then echo "::error::symlinks in _site break Pages deployments:"; find _site -type l; exit 1; fi
          echo "site OK: $(du -sh _site | cut -f1), $(find _site -type f | wc -l) files"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          timeout: 1800000        # 30 min of status polling before aborting
          error_count: 10         # tolerate transient status-API errors
          reporting_interval: 10000
